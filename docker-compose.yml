services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: groweasy-backend-container
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: groweasy-frontend-container
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped